stages:
  - publish

pages:
  stage: publish
  image: registry.git.mpib-berlin.mpg.de/neurocode/git-workshop/xaringan:latest
  script:
    # note that 'git-advanced.Rmd' should be replaced with main file at some point: 
    - Rscript -e "rmarkdown::render('git-advanced.Rmd', 'all', output_dir = 'public', output_file = 'index.html')"
  artifacts:
    paths:
      - public
  only:
    # note that this should be replaced with master once all the different documents are merged:
    - git-advanced
